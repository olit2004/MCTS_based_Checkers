services:

  # ─── FastAPI + MCTS backend ────────────────────────────────────────────────
  backend:
    build:
      context: .            # project root — so the package path "backend.*" resolves
      dockerfile: backend/Dockerfile
    container_name: mcts_checkers_backend
    restart: unless-stopped
    ports:
      - "8000:8000"         # optional direct access for local dev / debugging
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── React / Vite frontend (Nginx) ────────────────────────────────────────
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: mcts_checkers_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
