<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="12" ry="12" fill="#1a1a2e"/>

  <!-- Checkerboard accent squares (top-left quadrant) -->
  <rect x="4" y="4" width="10" height="10" rx="2" fill="#e63946" opacity="0.9"/>
  <rect x="14" y="4" width="10" height="10" rx="2" fill="#1a1a2e"/>
  <rect x="4" y="14" width="10" height="10" rx="2" fill="#1a1a2e"/>
  <rect x="14" y="14" width="10" height="10" rx="2" fill="#e63946" opacity="0.5"/>

  <!-- "oC" text in two colors -->
  <text
    x="32"
    y="44"
    font-family="'Arial Rounded MT Bold', 'Arial', sans-serif"
    font-size="26"
    font-weight="900"
    text-anchor="middle"
    fill="#e63946"
    letter-spacing="-1"
  >o<tspan fill="#ffffff">Check</tspan></text>
</svg>